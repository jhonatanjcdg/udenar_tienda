version: '3.8'

services:
  app:
    build: .
    container_name: tienda_app
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: tienda_db
      DB_USER: jhonatan
      DB_PASS: 'XkgKPVpcwy2[b(/I'
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: tienda_db_container
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tienda_db
      MYSQL_USER: jhonatan
      MYSQL_PASSWORD: 'XkgKPVpcwy2[b(/I'
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
